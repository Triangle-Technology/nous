name: Publish bindings

# Triggered by pushing a version tag (e.g. `git tag v0.4.0 && git push --tags`).
# Builds platform-specific wheels (Python) and native addons (Node) on GitHub
# runners, then publishes to PyPI + npm using tokens stored as repo secrets.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   PYPI_API_TOKEN — https://pypi.org/manage/account/token/ (scope: all packages for first publish of `noos`, can narrow after)
#   NPM_TOKEN      — Granular access token with "All packages" read+write + 2FA bypass (for first publish of `@triangle-technology/noos`)
#
# Manual dispatch: Actions tab → "Publish bindings" → Run workflow. Checkboxes
# let you skip Python or Node independently.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish-python:
        description: "Publish noos (Python binding) to PyPI"
        type: boolean
        default: true
      publish-langchain:
        description: "Publish noos-langchain to PyPI"
        type: boolean
        default: true
      publish-node:
        description: "Publish @triangle-technology/noos to npm"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────
  # Python: build one abi3-py39 wheel per platform, publish to PyPI.
  # abi3-py39 means a single wheel per platform covers Python 3.9+.
  # ────────────────────────────────────────────────────────────────

  python-build:
    if: github.event_name == 'push' || inputs.publish-python
    name: Python wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: auto
          - target: x86_64-apple-darwin
            runner: macos-latest
            manylinux: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            manylinux: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            manylinux: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: bindings/python/dist

  python-publish:
    if: github.event_name == 'push' || inputs.publish-python
    needs: python-build
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: Check wheels before upload
        run: |
          python -m pip install --upgrade pip twine
          twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*

  # ────────────────────────────────────────────────────────────────
  # noos-langchain: pure-Python pip package. Builds one universal
  # sdist + wheel on ubuntu. Independent of `python-publish` — the
  # published wheel declares `noos>=0.1.0`, which is already live on
  # PyPI as of the first `python-publish` run. First-ever run can use
  # workflow_dispatch with `publish-python=true` + `publish-langchain=true`
  # so `noos` lands on PyPI first; subsequent langchain-only runs can
  # leave `publish-python=false`.
  # ────────────────────────────────────────────────────────────────

  langchain-build:
    if: github.event_name == 'push' || inputs.publish-langchain
    name: noos-langchain wheel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/python-langchain
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel via hatch
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel --outdir dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheel-langchain
          path: bindings/python-langchain/dist

  langchain-publish:
    if: github.event_name == 'push' || inputs.publish-langchain
    needs: [langchain-build]
    name: Publish noos-langchain to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheel-langchain
          path: dist

      - name: Check wheels before upload
        run: |
          python -m pip install --upgrade pip twine
          twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*

  # ────────────────────────────────────────────────────────────────
  # Node: build one native addon per target triple, publish via
  # napi-rs's split-package scheme (main `@triangle-technology/noos`
  # package + one `@triangle-technology/noos-<target>` subpackage per triple).
  # ────────────────────────────────────────────────────────────────

  node-build:
    if: github.event_name == 'push' || inputs.publish-node
    name: Node addon (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cross-compile toolchain (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install npm deps
        run: npm install

      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          # Include generated wrapper files alongside the .node binary.
          # `napi build --platform` writes index.js + index.d.ts to the
          # working directory root — without uploading them here, the
          # published npm package has `main: "index.js"` pointing at a
          # file that doesn't exist (0.1.0 bug).
          path: |
            bindings/node/*.node
            bindings/node/index.js
            bindings/node/index.d.ts
          if-no-files-found: error

  node-publish:
    if: github.event_name == 'push' || inputs.publish-node
    needs: node-build
    name: Publish to npm
    runs-on: ubuntu-latest
    # Required by NPM_CONFIG_PROVENANCE=true below — npm provenance
    # needs GitHub's OIDC token to sign the attestation.
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm deps (for napi CLI)
        run: npm install

      - name: Download all platform binaries
        uses: actions/download-artifact@v8
        with:
          pattern: addon-*
          # Flatten the per-target subdirs so `napi artifacts` finds
          # every .node file directly under artifacts/ (matches the
          # Python download step above).
          merge-multiple: true
          path: bindings/node/artifacts

      - name: Move wrapper files to package root
        # index.js + index.d.ts are the same across all 5 target
        # uploads (overwrote each other during merge-multiple). Move
        # them to bindings/node/ root where package.json's `main`
        # field points. Without this, the published package is missing
        # its entry point — that was the 0.1.0 bug.
        run: |
          if [ -f artifacts/index.js ]; then
            mv artifacts/index.js .
            mv artifacts/index.d.ts .
          fi

      - name: Create per-platform npm package dirs
        # napi 3.x stopped auto-creating these during `artifacts`; each
        # target in package.json's `napi.targets` gets its own subdir
        # under npm/ with a platform-specific package.json.
        run: npx napi create-npm-dirs --npm-dir npm

      - name: Place binaries into platform subpackage dirs
        # @napi-rs/cli 3.x renamed `--dir` → `--output-dir`
        # (`--npm-dir` stays the same).
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Publish platform subpackages + main
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          # Each platform subdir under npm/ was created by `napi artifacts`.
          # Publish them first so the main package's optional deps resolve.
          for dir in npm/*/; do
            echo "::group::Publishing $dir"
            (cd "$dir" && npm publish --access public)
            echo "::endgroup::"
          done
          echo "::group::Publishing main package"
          npm publish --access public
          echo "::endgroup::"
