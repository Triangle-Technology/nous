name: Publish bindings

# Triggered by pushing a version tag (e.g. `git tag v0.4.0 && git push --tags`).
# Builds platform-specific wheels (Python) and native addons (Node) on GitHub
# runners, then publishes to PyPI + npm using tokens stored as repo secrets.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   PYPI_API_TOKEN — https://pypi.org/manage/account/token/ (scope: all packages for first publish of `noos`, can narrow after)
#   NPM_TOKEN      — Granular access token with "All packages" read+write + 2FA bypass (for first publish of `@triangle-technology/noos`)
#
# Manual dispatch: Actions tab → "Publish bindings" → Run workflow. Checkboxes
# let you skip Python or Node independently.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish-python:
        description: "Publish Python to PyPI"
        type: boolean
        default: true
      publish-node:
        description: "Publish Node to npm"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────
  # Python: build one abi3-py39 wheel per platform, publish to PyPI.
  # abi3-py39 means a single wheel per platform covers Python 3.9+.
  # ────────────────────────────────────────────────────────────────

  python-build:
    if: github.event_name == 'push' || inputs.publish-python
    name: Python wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: auto
          - target: x86_64-apple-darwin
            runner: macos-latest
            manylinux: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            manylinux: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            manylinux: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: bindings/python/dist

  python-publish:
    if: github.event_name == 'push' || inputs.publish-python
    needs: python-build
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: Check wheels before upload
        run: |
          python -m pip install --upgrade pip twine
          twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*

  # ────────────────────────────────────────────────────────────────
  # Node: build one native addon per target triple, publish via
  # napi-rs's split-package scheme (main `@triangle-technology/noos`
  # package + one `@triangle-technology/noos-<target>` subpackage per triple).
  # ────────────────────────────────────────────────────────────────

  node-build:
    if: github.event_name == 'push' || inputs.publish-node
    name: Node addon (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cross-compile toolchain (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install npm deps
        run: npm install

      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  node-publish:
    if: github.event_name == 'push' || inputs.publish-node
    needs: node-build
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm deps (for napi CLI)
        run: npm install

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: addon-*
          path: bindings/node/artifacts

      - name: Place binaries into platform subpackage dirs
        run: npx napi artifacts --dir artifacts --npm-dir npm

      - name: Publish platform subpackages + main
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          # Each platform subdir under npm/ was created by `napi artifacts`.
          # Publish them first so the main package's optional deps resolve.
          for dir in npm/*/; do
            echo "::group::Publishing $dir"
            (cd "$dir" && npm publish --access public)
            echo "::endgroup::"
          done
          echo "::group::Publishing main package"
          npm publish --access public
          echo "::endgroup::"
